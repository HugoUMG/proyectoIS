version: '3.9'

services:
  backend:
    build:
      context: ./gestion-activos-backend/src
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:h2:mem:gestion_activos;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      DB_USER: sa
      DB_PASSWORD: ''
      DB_DRIVER: org.h2.Driver
      JPA_DIALECT: org.hibernate.dialect.H2Dialect
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./gestion-activos-frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"
